<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Goal Setting · Action Plan</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.15s ease;
        }

        body {
            background: #0B0C10;
            background-image: radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.08) 0%, rgba(0, 0, 0, 0) 80%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #EFF3FA;
        }

        .navbar {
            background: #0B0E17 !important;
            border-bottom: 2px solid #4c3b9b !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .navbar-brand {
            background: linear-gradient(135deg, #3b0ccb, #5B6CFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            font-weight: 800;
            letter-spacing: -0.3px;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(95deg, #7C5CBF, #5B4B9F);
            border: none;
            box-shadow: 0 4px 12px rgba(91, 75, 159, 0.4);
            font-weight: 600;
        }
        .btn-primary:hover {
            background: linear-gradient(95deg, #8e6ed6, #6d5bbf);
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(110, 80, 200, 0.5);
        }

        .btn-outline-danger {
            color: #f8a5c2;
            border-color: #a1587e;
        }
        .btn-outline-danger:hover {
            background: #862e5c;
            color: white;
        }

        .card {
            border-radius: 1.5rem !important;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(98, 70, 234, 0.15);
            background: #10121fcc;
            backdrop-filter: blur(2px);
        }

        .goal-card {
            background: #0f1120dd !important;
            border-radius: 1.4rem !important;
            backdrop-filter: blur(3px);
            transition: transform 0.1s ease;
            height: 100%;
            border: 1px solid rgba(100, 80, 200, 0.3);
        }
        .goal-card:hover {
            transform: translateY(-3px);
            border-color: #7a64e0 !important;
        }

        .goal-item {
            background: #191b2d;
            border-radius: 1rem;
            padding: 0.5rem 0.7rem;
            margin-bottom: 0.6rem;
            border-left: 3px solid #7c5cbf;
        }
        .goal-item .goal-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #ececff;
        }
        .goal-item .goal-desc {
            font-size: 0.7rem;
            color: #b8aeff;
            margin-top: 0.15rem;
        }
        .goal-actions .btn-sm {
            padding: 0.15rem 0.45rem;
            font-size: 0.7rem;
            border-radius: 30px;
        }

        .badge-goal-count {
            background: #5B4B9F;
            color: white;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.75rem;
            padding: 0.25rem 0.7rem;
        }

        .form-control, .form-select {
            background-color: #0E1022 !important;
            border: 1.5px solid #312b5e !important;
            color: #F0F3FF !important;
            border-radius: 1rem;
            padding: 0.7rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #957AFF !important;
            box-shadow: 0 0 0 3px rgba(107, 70, 220, 0.4) !important;
            background-color: #13162B !important;
        }
        .form-label {
            font-weight: 600;
            color: #C2C9FF;
            margin-bottom: 0.5rem;
        }

        footer {
            background: transparent;
            border-top: 1px solid #2D295A;
            color: #9198C0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1C28;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #5F51B5;
            border-radius: 10px;
        }

        .goals-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }
        .goal-col {
            flex: 1 1 240px;
        }

        .floating-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: #4C3790;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .goal-created {
            font-size: 0.65rem;
            color: #9a92c2;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid container">
        <a class="navbar-brand fw-bold fs-4" id="refreshBrand" href="#" style="cursor: pointer;">
            <i class="fas fa-bullseye me-2" style="color:#9b87f5;"></i> Goal<span style="color:#7C6ADE;">Setter</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="filter: invert(0.7);"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <button class="btn btn-outline-danger btn-sm" id="clearAllGoalsBtn" style="border-radius: 40px;">
                        <i class="fas fa-trash-alt me-1"></i> Clear all goals
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
        <div>
            <i class="fas fa-chart-line fs-2 me-2" style="color:#B287FF;"></i>
            <h1 class="d-inline-block fw-bold display-6" style="background: linear-gradient(135deg,#cbb6ff, #9a77ff); -webkit-background-clip:text; background-clip:text; color:transparent;">Goal Setting - Action Plan</h1>
        </div>
    </div>

    <!-- Goals grid (dynamic categories) -->
    <div class="goals-grid" id="goalsContainer">
        <!-- categories injected here -->
    </div>
</div>

<!-- MODAL: Add / Edit Goal -->
<div class="modal fade" id="goalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:#14172b !important; border:1px solid #6f5dc2;">
            <div class="modal-header border-bottom border-secondary">
                <h5 class="modal-title" id="goalModalTitle"><i class="fas fa-plus-circle me-2"></i>Add Goal</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="goalForm">
                    <input type="hidden" id="editGoalId" value="">
                    <input type="hidden" id="currentCategoryKey" value="">
                    <div class="mb-3">
                        <label class="form-label">Timeframe <span class="text-danger">*</span></label>
                        <select id="goalCategorySelect" class="form-select" required>
                            <!-- options filled dynamically -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Goal title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="goalTitle" placeholder="e.g., Finish project, Learn new skill">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description (optional)</label>
                        <textarea class="form-control" id="goalDesc" rows="2" placeholder="Action steps, milestones ..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveGoalBtn"><i class="fas fa-save me-1"></i> Save Goal</button>
            </div>
        </div>
    </div>
</div>

<footer class="container text-center py-4 mt-4">
    <p class="mb-0">🎯 Define your ambitions, track progress — every goal starts with a plan.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ==============================================
    // GOAL SETTING - ACTION PLAN (standalone)
    // Categories: Day, Week, Month, Year 1 .. Year 10
    // ==============================================
    const STORAGE_KEY = 'goal_setting_action_plan';
    
    // Predefined categories (timeframes)
    const CATEGORIES = [
        { key: "day", label: "Day (Today)" },
        { key: "week", label: "Week (This Week)" },
        { key: "month", label: "Month (This Month)" },
        { key: "year1", label: "Year 1" },
        { key: "year2", label: "Year 2" },
        { key: "year3", label: "Year 3" },
        { key: "year4", label: "Year 4" },
        { key: "year5", label: "Year 5" },
        { key: "year6", label: "Year 6" },
        { key: "year7", label: "Year 7" },
        { key: "year8", label: "Year 8" },
        { key: "year9", label: "Year 9" },
        { key: "year10", label: "Year 10" }
    ];
    
    // Data structure: { goals: { categoryKey: [ { id, title, desc, created } ] } }
    let goalsData = {};
    let nextId = 1;
    
    // Modal & UI references
    let goalModal = null;
    let currentEditId = null;
    let currentCategoryForEdit = null;
    
    // Helper: show floating notice
    function showNotice(msg, bgColor = "#6a4c9c") {
        const toast = document.createElement('div');
        toast.className = 'floating-toast';
        toast.style.background = bgColor;
        toast.innerHTML = `<i class="fas fa-info-circle me-2"></i>${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }
    
    // Load from localStorage
    function loadGoals() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            const parsed = JSON.parse(stored);
            goalsData = parsed.goals || {};
            nextId = parsed.nextId || 1;
        } else {
            goalsData = {};
            nextId = 1;
            // Initialize empty arrays for each category
            CATEGORIES.forEach(cat => {
                if (!goalsData[cat.key]) goalsData[cat.key] = [];
            });
        }
        // ensure every category exists
        CATEGORIES.forEach(cat => {
            if (!goalsData[cat.key]) goalsData[cat.key] = [];
        });
        saveToLocal();
    }
    
    function saveToLocal() {
        const toStore = {
            goals: goalsData,
            nextId: nextId
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
    }
    
    function getNextId() {
        return nextId++;
    }
    
    // CRUD operations for goals inside a category
    function addGoal(categoryKey, title, desc) {
        if (!title.trim()) return false;
        const newGoal = {
            id: getNextId(),
            title: title.trim(),
            desc: desc ? desc.trim() : "",
            created: new Date().toISOString()
        };
        if (!goalsData[categoryKey]) goalsData[categoryKey] = [];
        goalsData[categoryKey].push(newGoal);
        saveToLocal();
        return true;
    }
    
    function updateGoal(categoryKey, goalId, title, desc) {
        const categoryGoals = goalsData[categoryKey];
        if (!categoryGoals) return false;
        const index = categoryGoals.findIndex(g => g.id === goalId);
        if (index === -1) return false;
        categoryGoals[index].title = title.trim();
        categoryGoals[index].desc = desc ? desc.trim() : "";
        saveToLocal();
        return true;
    }
    
    function deleteGoal(categoryKey, goalId) {
        if (!goalsData[categoryKey]) return false;
        const initialLen = goalsData[categoryKey].length;
        goalsData[categoryKey] = goalsData[categoryKey].filter(g => g.id !== goalId);
        if (goalsData[categoryKey].length !== initialLen) {
            saveToLocal();
            return true;
        }
        return false;
    }
    
    function clearAllGoals() {
        if (confirm("⚠️ DELETE EVERY GOAL from ALL timeframes? This action is irreversible.")) {
            CATEGORIES.forEach(cat => {
                goalsData[cat.key] = [];
            });
            saveToLocal();
            renderAllGoals();
            showNotice("🗑️ All goals cleared", "#b3476e");
        }
    }
    
    // Helper: format datetime
    function formatDate(isoString) {
        if (!isoString) return "";
        const d = new Date(isoString);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Render all categories as cards
    function renderAllGoals() {
        const container = document.getElementById('goalsContainer');
        if (!container) return;
        let html = '';
        for (let cat of CATEGORIES) {
            const items = goalsData[cat.key] || [];
            const count = items.length;
            let itemsHtml = '';
            if (items.length === 0) {
                itemsHtml = `<div class="text-center text-muted small py-2" style="color:#a7a0cf;"><i class="far fa-flag"></i> No goals yet</div>`;
            } else {
                items.forEach(goal => {
                    const createdStr = goal.created ? formatDate(goal.created) : '';
                    const descHtml = goal.desc ? `<div class="goal-desc">📝 ${escapeHtml(goal.desc)}</div>` : '';
                    itemsHtml += `
                        <div class="goal-item">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="goal-title">🎯 ${escapeHtml(goal.title)}</div>
                                    ${descHtml}
                                    ${createdStr ? `<div class="goal-created"><i class="far fa-calendar-alt"></i> ${createdStr}</div>` : ''}
                                </div>
                                <div class="goal-actions">
                                    <button class="btn btn-sm btn-outline-light edit-goal-btn" data-category="${cat.key}" data-id="${goal.id}"><i class="fas fa-pen"></i></button>
                                    <button class="btn btn-sm btn-outline-danger ms-1 delete-goal-btn" data-category="${cat.key}" data-id="${goal.id}"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            html += `
                <div class="goal-col">
                    <div class="goal-card card h-100 p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="mb-0 fw-bold" style="color:#d9ceff;">${cat.label}</h5>
                            <span class="badge-goal-count">${count}</span>
                        </div>
                        <div class="goals-list mb-3" style="max-height: 300px; overflow-y: auto; padding-right: 4px;">
                            ${itemsHtml}
                        </div>
                        <button class="btn btn-sm btn-primary w-100 mt-1 add-goal-btn" data-category="${cat.key}">
                            <i class="fas fa-plus-circle me-1"></i> Add goal
                        </button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        
        // Attach dynamic event listeners
        document.querySelectorAll('.add-goal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.getAttribute('data-category');
                openGoalModal(null, category);
            });
        });
        document.querySelectorAll('.edit-goal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.getAttribute('data-category');
                const id = parseInt(btn.getAttribute('data-id'));
                openGoalModal(id, category);
            });
        });
        document.querySelectorAll('.delete-goal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const category = btn.getAttribute('data-category');
                const id = parseInt(btn.getAttribute('data-id'));
                if (confirm("Delete this goal?")) {
                    if (deleteGoal(category, id)) {
                        renderAllGoals();
                        showNotice("❌ Goal removed", "#c25b7a");
                    } else {
                        showNotice("Failed to delete", "#b3476e");
                    }
                }
            });
        });
    }
    
    // Populate category dropdown in modal
    function populateCategorySelect(selectedKey = null) {
        const select = document.getElementById('goalCategorySelect');
        if (!select) return;
        select.innerHTML = '';
        CATEGORIES.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.key;
            option.textContent = cat.label;
            if (selectedKey === cat.key) option.selected = true;
            select.appendChild(option);
        });
    }
    
    // Open modal for add / edit
    function openGoalModal(editId = null, presetCategory = null) {
        if (!goalModal) {
            const modalElem = document.getElementById('goalModal');
            if (modalElem) goalModal = new bootstrap.Modal(modalElem);
            else return;
        }
        
        const modalTitle = document.getElementById('goalModalTitle');
        const titleInput = document.getElementById('goalTitle');
        const descInput = document.getElementById('goalDesc');
        const editIdField = document.getElementById('editGoalId');
        const categorySelect = document.getElementById('goalCategorySelect');
        
        // Reset form
        titleInput.value = '';
        descInput.value = '';
        editIdField.value = '';
        currentEditId = null;
        currentCategoryForEdit = null;
        
        if (editId !== null && presetCategory) {
            // Edit mode: find goal
            const categoryGoals = goalsData[presetCategory];
            if (categoryGoals) {
                const goal = categoryGoals.find(g => g.id === editId);
                if (goal) {
                    currentEditId = goal.id;
                    currentCategoryForEdit = presetCategory;
                    modalTitle.innerHTML = '<i class="fas fa-edit me-2"></i>Edit Goal';
                    titleInput.value = goal.title;
                    descInput.value = goal.desc || '';
                    editIdField.value = goal.id;
                    // pre-select category in dropdown, but disable editing category for existing goal? 
                    // For consistency we allow changing category? Usually you might want to move goal.
                    // We'll allow category switch (update will move to new category). Good UX.
                    populateCategorySelect(presetCategory);
                } else {
                    // fallback to add mode
                    modalTitle.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Goal';
                    populateCategorySelect(presetCategory || "day");
                }
            } else {
                modalTitle.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Goal';
                populateCategorySelect(presetCategory || "day");
            }
        } else {
            // Add mode
            modalTitle.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Goal';
            populateCategorySelect(presetCategory || "day");
        }
        
        if (!currentEditId) {
            editIdField.value = '';
            currentCategoryForEdit = null;
        }
        
        goalModal.show();
    }
    
    // Save from modal (create or update)
    function saveGoalFromModal() {
        const title = document.getElementById('goalTitle').value.trim();
        const desc = document.getElementById('goalDesc').value;
        const categoryKey = document.getElementById('goalCategorySelect').value;
        const editIdVal = document.getElementById('editGoalId').value;
        
        if (!title) {
            showNotice("⚠️ Please enter a goal title", "#b3476e");
            return false;
        }
        
        let success = false;
        if (editIdVal && editIdVal !== "") {
            const goalId = parseInt(editIdVal);
            // In edit mode: if category changed, we need to delete from old category and add to new.
            // But we have currentCategoryForEdit stored; if category differs, we move goal.
            if (currentCategoryForEdit && currentCategoryForEdit !== categoryKey) {
                // Move: delete from old, add new in new category
                const oldCatGoals = goalsData[currentCategoryForEdit];
                const goalExists = oldCatGoals?.find(g => g.id === goalId);
                if (goalExists) {
                    // delete from old
                    const filtered = oldCatGoals.filter(g => g.id !== goalId);
                    goalsData[currentCategoryForEdit] = filtered;
                    // add new in target category
                    const movedGoal = {
                        id: goalId,
                        title: title,
                        desc: desc ? desc.trim() : "",
                        created: goalExists.created || new Date().toISOString()
                    };
                    if (!goalsData[categoryKey]) goalsData[categoryKey] = [];
                    goalsData[categoryKey].push(movedGoal);
                    saveToLocal();
                    success = true;
                    showNotice(`📌 Goal moved to ${CATEGORIES.find(c=>c.key===categoryKey)?.label}`, "#5B4B9F");
                } else {
                    success = false;
                }
            } else {
                // update in same category
                success = updateGoal(categoryKey, goalId, title, desc);
            }
            if (success) {
                showNotice("✅ Goal updated", "#4f7a69");
            } else {
                showNotice("❌ Update failed", "#b3476e");
            }
        } else {
            // Add new
            success = addGoal(categoryKey, title, desc);
            if (success) showNotice("✨ New goal added", "#7a5bc9");
            else showNotice("Failed to add goal", "#b3476e");
        }
        
        if (success) {
            renderAllGoals();
            if (goalModal) goalModal.hide();
        }
        return success;
    }
    
    // Refresh all data (used after storage events)
    function refreshAll() {
        loadGoals();
        renderAllGoals();
        showNotice("Goals refreshed", "#5B4B9F");
    }
    
    // ========== INIT ==========
    function init() {
        loadGoals();
        renderAllGoals();
        
        // Bind buttons
        const clearBtn = document.getElementById('clearAllGoalsBtn');
        if (clearBtn) clearBtn.addEventListener('click', clearAllGoals);
        
        const saveModalBtn = document.getElementById('saveGoalBtn');
        if (saveModalBtn) saveModalBtn.addEventListener('click', saveGoalFromModal);
        
        const brand = document.getElementById('refreshBrand');
        if (brand) {
            brand.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.reload();
            });
        }
        
        // sync across tabs
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                loadGoals();
                renderAllGoals();
                showNotice("Goals updated from another tab", "#5B4B9F");
            }
        });
        
        // ensure modal is properly initialized
        const modalElem = document.getElementById('goalModal');
        if (modalElem) {
            modalElem.addEventListener('hidden.bs.modal', () => {
                // reset form
                document.getElementById('goalTitle').value = '';
                document.getElementById('goalDesc').value = '';
                document.getElementById('editGoalId').value = '';
                currentEditId = null;
                currentCategoryForEdit = null;
            });
        }
    }
    
    init();
</script>
</body>
</html>
