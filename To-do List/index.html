<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

    <title>To-Do List</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">To-Do List</a>
    </nav>

    <div class="container my-4">
        <h2 class="text-center">To-Do List</h2>

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title">
            <small class="form-text text-muted">Add an item to the List</small>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
        </div>

        <button type="button" id="add" class="btn btn-primary">Add to List</button>

        <div id="items" class="my-4">
            <h2>Your Items</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">SNo.</th>
                        <th scope="col">Item Title</th>
                        <th scope="col">Item Description</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Items will be dynamically added here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            updateTable(); // Load stored items when page loads
        });

        document.getElementById("add").addEventListener("click", () => {
            let title = document.getElementById("title").value.trim();
            let description = document.getElementById("description").value.trim();

            if (title === "" || description === "") {
                alert("Title and Description cannot be empty!");
                return;
            }

            let itemsArray = JSON.parse(localStorage.getItem("items")) || [];
            itemsArray.push({ title, description });
            localStorage.setItem("items", JSON.stringify(itemsArray));

            updateTable(); // Refresh table
            document.getElementById("title").value = ""; 
            document.getElementById("description").value = ""; 
        });

        function updateTable() {
            let itemsArray = JSON.parse(localStorage.getItem("items")) || [];
            let tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = ""; // Clear table before updating

            itemsArray.forEach((item, index) => {
                let row = `<tr>
                    <th scope="row">${index + 1}</th>
                    <td>${item.title}</td>
                    <td>${item.description}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteItem(${index})">Delete</button></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        function deleteItem(index) {
            let itemsArray = JSON.parse(localStorage.getItem("items")) || [];
            itemsArray.splice(index, 1);
            localStorage.setItem("items", JSON.stringify(itemsArray));
            updateTable(); // Refresh table after deletion
        }
    </script>

</body>

</html>
